<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>WpDev Keyboard — Engineered Clarity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="Animation/222_000.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { background-color: #061913; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #ffffff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    canvas { display: block; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.85);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay { will-change: opacity, transform; opacity: 0; }
    #loader { transition: opacity 300ms ease; }
  </style>
</head>
<body>

  <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center" style="background-color:#061913;">
    <div class="spinner" aria-hidden="true"></div>
    <p id="loader-text" class="mt-6 text-sm tracking-tight text-white/60">Loading WpDev sequence&hellip; 0%</p>
  </div>

  <a href="portfolio.html" class="fixed top-6 left-6 z-40 text-sm tracking-tight text-white/60 hover:text-white/90 transition-colors">
    &larr; Portfolio
  </a>

  <div class="fixed top-6 right-6 z-40 text-xs tracking-[0.2em] uppercase text-white/40">
    WpDev / 001
  </div>

  <div id="runway" class="relative h-[400vh]">
    <div class="sticky top-0 h-screen w-full overflow-hidden">

      <canvas id="kb-canvas" class="absolute inset-0 w-full h-full"></canvas>

      <div id="overlay-0" class="overlay absolute inset-x-0 top-10 md:top-20 flex flex-col items-center text-center px-6 pointer-events-none">
        <h1 class="text-5xl md:text-7xl font-medium tracking-tight text-white/90">WpDev Keyboard.</h1>
        <p class="mt-3 text-base md:text-lg tracking-tight text-white/60">Engineered clarity.</p>
      </div>

      <div id="overlay-1" class="overlay absolute left-6 md:left-16 top-1/2 max-w-xs md:max-w-md text-left pointer-events-none">
        <h2 class="text-4xl md:text-6xl font-medium tracking-tight text-white/90 leading-[1.05]">Built for<br>Precision.</h2>
        <p class="mt-3 text-base md:text-lg tracking-tight text-white/60">Every detail, measured.</p>
      </div>

      <div id="overlay-2" class="overlay absolute right-6 md:right-16 top-1/2 max-w-xs md:max-w-md text-right pointer-events-none">
        <h2 class="text-4xl md:text-6xl font-medium tracking-tight text-white/90 leading-[1.05]">Layered<br>Engineering.</h2>
        <p class="mt-3 text-base md:text-lg tracking-tight text-white/60">See what&rsquo;s inside.</p>
      </div>

      <div id="overlay-3" class="overlay absolute inset-x-0 bottom-12 md:bottom-20 flex flex-col items-center text-center px-6 pointer-events-none">
        <h2 class="text-5xl md:text-7xl font-medium tracking-tight text-white/90">Assembled. Ready.</h2>
        <p class="mt-3 text-base md:text-lg tracking-tight text-white/60">Scroll back to replay.</p>
      </div>

      <div id="scroll-hint" class="absolute inset-x-0 bottom-6 flex justify-center pointer-events-none transition-opacity duration-500">
        <div class="flex flex-col items-center text-white/40">
          <span class="text-[10px] tracking-[0.3em] uppercase">Scroll</span>
          <div class="mt-2 h-8 w-px bg-white/30"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const TOTAL_FRAMES = 52;
      const FOG = '#061913';
      const framePath = (i) => 'Animation/222_' + String(i).padStart(3, '0') + '.png';

      const canvas    = document.getElementById('kb-canvas');
      const ctx       = canvas.getContext('2d');
      const loader    = document.getElementById('loader');
      const loaderTxt = document.getElementById('loader-text');
      const runway    = document.getElementById('runway');
      const hint      = document.getElementById('scroll-hint');
      const overlays  = [0, 1, 2, 3].map((i) => document.getElementById('overlay-' + i));
      const beats     = [0.00, 0.25, 0.60, 0.90];

      let dpr  = Math.min(window.devicePixelRatio || 1, 2);
      let cssW = 0, cssH = 0;

      function resize() {
        const r = canvas.getBoundingClientRect();
        cssW = r.width;
        cssH = r.height;
        canvas.width  = Math.max(1, Math.round(cssW * dpr));
        canvas.height = Math.max(1, Math.round(cssH * dpr));
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
      }

      const images = new Array(TOTAL_FRAMES);
      let loaded = 0;

      function loadFrame(i) {
        return new Promise((resolve) => {
          const img = new Image();
          const done = () => {
            images[i] = img;
            loaded++;
            const pct = Math.round((loaded / TOTAL_FRAMES) * 100);
            loaderTxt.textContent = 'Loading WpDev sequence… ' + pct + '%';
            resolve();
          };
          img.onload  = done;
          img.onerror = done;
          img.decoding = 'async';
          img.src = framePath(i);
        });
      }

      function draw(idx) {
        ctx.fillStyle = FOG;
        ctx.fillRect(0, 0, cssW, cssH);
        const img = images[idx];
        if (!img || !img.naturalWidth) return;
        const iw = img.naturalWidth, ih = img.naturalHeight;
        const s  = Math.min(cssW / iw, cssH / ih);
        const dw = iw * s, dh = ih * s;
        const dx = (cssW - dw) / 2;
        const dy = (cssH - dh) / 2;
        ctx.drawImage(img, dx, dy, dw, dh);
      }

      function progress() {
        const r = runway.getBoundingClientRect();
        const total = r.height - window.innerHeight;
        if (total <= 0) return 0;
        const p = -r.top / total;
        return p < 0 ? 0 : (p > 1 ? 1 : p);
      }

      function fade(p, center, halfWidth) {
        halfWidth = halfWidth || 0.08;
        const d = Math.abs(p - center);
        const v = 1 - d / halfWidth;
        return v < 0 ? 0 : v;
      }

      let lastIdx = -1;
      let dirty = true;
      let started = false;

      function tick() {
        if (dirty) {
          const p = progress();
          const idx = Math.min(TOTAL_FRAMES - 1, Math.round(p * (TOTAL_FRAMES - 1)));
          if (idx !== lastIdx) {
            draw(idx);
            lastIdx = idx;
          }
          for (let i = 0; i < overlays.length; i++) {
            const a  = fade(p, beats[i]);
            const ty = (1 - a) * 10;
            overlays[i].style.opacity = a.toFixed(3);
            if (i === 1 || i === 2) {
              overlays[i].style.transform = 'translate(0, calc(-50% + ' + ty.toFixed(2) + 'px))';
            } else {
              overlays[i].style.transform = 'translateY(' + ty.toFixed(2) + 'px)';
            }
          }
          if (hint) hint.style.opacity = (p < 0.05 ? 1 - p / 0.05 : 0).toFixed(3);
          dirty = false;
        }
        requestAnimationFrame(tick);
      }

      function markDirty() { dirty = true; }

      async function bootstrap() {
        resize();
        ctx.fillStyle = FOG;
        ctx.fillRect(0, 0, cssW, cssH);

        const tasks = [];
        for (let i = 0; i < TOTAL_FRAMES; i++) tasks.push(loadFrame(i));
        await Promise.all(tasks);

        draw(0);
        lastIdx = 0;

        loader.style.opacity = '0';
        loader.style.pointerEvents = 'none';
        setTimeout(() => { if (loader && loader.parentNode) loader.parentNode.removeChild(loader); }, 350);

        if (!started) {
          started = true;
          window.addEventListener('scroll', markDirty, { passive: true });
          window.addEventListener('resize', () => {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            resize();
            markDirty();
          });
          requestAnimationFrame(tick);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootstrap);
      } else {
        bootstrap();
      }
    })();
  </script>
</body>
</html>
